# Example: Run portainer-mcp alongside Portainer in the same compose file.
# Adjust the environment variables and ports to match your setup.

services:
  portainer:
    image: portainer/portainer-ce:latest
    restart: always
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  portainer-mcp:
    image: ghcr.io/serraniel/portainer-mcp-docker:latest
    restart: "no"
    stdin_open: true
    environment:
      - PORTAINER_SERVER=https://portainer:9443
      - PORTAINER_TOKEN=${PORTAINER_TOKEN}
    command:
      - "-server"
      - "https://portainer:9443"
      - "-token"
      - "${PORTAINER_TOKEN}"
      # Uncomment for read-only mode:
      # - "-read-only"
      # Uncomment to skip Portainer version validation:
      # - "-disable-version-check"

volumes:
  portainer_data:
