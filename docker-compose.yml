# Example: Run portainer-mcp HTTP variant alongside Portainer.
# For stdio variant usage, see the README.

services:
  portainer:
    image: portainer/portainer-ce:latest
    restart: always
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  portainer-mcp:
    image: ghcr.io/serraniel/portainer-mcp-docker:http
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORTAINER_SERVER=https://portainer:9443
      - PORTAINER_TOKEN=${PORTAINER_TOKEN}
      - API_ACCESS_TOKEN=${MCP_API_TOKEN}
      # Uncomment for read-only mode:
      # - PORTAINER_READ_ONLY=true
      # Uncomment to skip Portainer version validation:
      # - PORTAINER_DISABLE_VERSION_CHECK=true

volumes:
  portainer_data:
