name: Release on Merge

on:
  push:
    branches:
      - main
    # Only trigger when actual code/config changes, not workflow-only changes
    paths:
      - "Dockerfile"
      - "Dockerfile.http"
      - "entrypoint-http.sh"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next build tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags found."
            exit 1
          fi

          UPSTREAM_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//' | sed 's/-[0-9]*$//')
          BUILD_NUMBER=$(echo "$LATEST_TAG" | grep -oP '\-\K[0-9]+$')
          NEXT_BUILD=$((BUILD_NUMBER + 1))
          NEW_TAG="v${UPSTREAM_VERSION}-${NEXT_BUILD}"

          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "upstream_version=${UPSTREAM_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
          UPSTREAM_VERSION: ${{ steps.tag.outputs.upstream_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}"
          git push origin "$NEW_TAG"

          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes "Based on upstream [portainer-mcp v${UPSTREAM_VERSION}](https://github.com/portainer/portainer-mcp/releases/tag/v${UPSTREAM_VERSION}).

          ### Docker Images
          - **stdio:** \`ghcr.io/serraniel/portainer-mcp-docker:${NEW_TAG}\` / \`latest\`
          - **HTTP:** \`ghcr.io/serraniel/portainer-mcp-docker:${NEW_TAG}-http\` / \`http\`"
