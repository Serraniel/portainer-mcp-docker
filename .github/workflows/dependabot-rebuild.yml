name: Rebuild on Dependabot Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  rebuild:
    if: github.event.pull_request.merged == true && github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next build tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the current upstream version from the latest tag
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags found, cannot determine version."
            exit 1
          fi

          # Extract upstream version and build number
          UPSTREAM_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//' | sed 's/-[0-9]*$//')
          BUILD_NUMBER=$(echo "$LATEST_TAG" | grep -oP '\-\K[0-9]+$')

          # Increment build number
          NEXT_BUILD=$((BUILD_NUMBER + 1))
          NEW_TAG="v${UPSTREAM_VERSION}-${NEXT_BUILD}"

          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "Next tag: ${NEW_TAG}"

      - name: Create release and trigger build
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Rebuild: base image update"
          git push origin "$NEW_TAG"

          UPSTREAM_VERSION=$(echo "$NEW_TAG" | sed 's/^v//' | sed 's/-[0-9]*$//')
          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes "Rebuild: base image / dependency update.

          Based on upstream [portainer-mcp v${UPSTREAM_VERSION}](https://github.com/portainer/portainer-mcp/releases/tag/v${UPSTREAM_VERSION}).

          ### Docker Images
          - **stdio:** \`ghcr.io/serraniel/portainer-mcp-docker:${NEW_TAG}\` / \`latest\`
          - **HTTP:** \`ghcr.io/serraniel/portainer-mcp-docker:${NEW_TAG}-http\` / \`http\`"
