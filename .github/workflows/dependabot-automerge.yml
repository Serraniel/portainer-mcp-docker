name: Dependabot Auto-Merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-build:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get upstream version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_VERSION=$(gh api repos/portainer/portainer-mcp/releases/latest --jq '.tag_name' | sed 's/^v//')
          echo "upstream_version=${UPSTREAM_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Test build (stdio)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            PORTAINER_MCP_VERSION=${{ steps.version.outputs.upstream_version }}

      - name: Test build (http)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.http
          platforms: linux/amd64
          push: false
          build-args: |
            PORTAINER_MCP_VERSION=${{ steps.version.outputs.upstream_version }}

  automerge:
    needs: test-build
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
